<!DOCTYPE html>
<html lang="eng">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Gallery</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f4f4f4;
    text-align:center;
    padding:20px;
}

h1{
    margin-bottom:20px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}

.gallery img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}

.gallery img:hover{
    transform:scale(1.05);
}

.lightbox{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
}

.lightbox img{
    max-width:80%;
    max-height:80%;
    border-radius:10px;
}

.close{
    position:absolute;
    top:20px;
    right:30px;
    color:white;
    font-size:40px;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>Image Gallery</h1>

<div class="gallery">
    <img src="https://picsum.photos/id/1015/400/300" onclick="openImage(this.src)">
    <img src="https://picsum.photos/id/1016/400/300" onclick="openImage(this.src)">
    <img src="https://picsum.photos/id/1018/400/300" onclick="openImage(this.src)">
    <img src="https://picsum.photos/id/1020/400/300" onclick="openImage(this.src)">
    <img src="https://picsum.photos/id/1024/400/300" onclick="openImage(this.src)">
    <img src="https://picsum.photos/id/1035/400/300" onclick="openImage(this.src)">
</div>

<div id="lightbox" class="lightbox">
    <span class="close" onclick="closeImage)">&times;</span>
    <img id="lightbox-img">
</div>

<script>
function openImage(src){
    document.getElementById("lightbox").style.display="flex";
    document.getElementById("lightbox-img").src=src;
}

function closeImage(){
    document.getElementById("lightbox").style.display="none";
}
</script>

</body>
</html>
